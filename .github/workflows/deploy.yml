name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: # allows manual trigger from GitHub UI

# Prevent overlapping deploys — if a new push comes in while deploying, cancel the old run
concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  # Image names on Docker Hub: e.g. youruser/counter-frontend:latest
  FRONTEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/counter-frontend
  BACKEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/counter-backend

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build & push both Docker images
  # ─────────────────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Sets up QEMU so we can build for linux/amd64 on GitHub's runners
      # (important if you ever switch to ARM — Oracle Ampere A1 is ARM)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Buildx gives us multi-platform builds + better caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build the React/Vite frontend image from root Dockerfile
      # Cache layers between runs using GitHub Actions cache
      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Tag with both :latest and the short git SHA for rollback capability
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      # Build the Express backend image from server/Dockerfile
      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  # ─────────────────────────────────────────────
  # JOB 2: SSH into Oracle VM and deploy
  # Runs only after build succeeds
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Oracle Cloud
    runs-on: ubuntu-latest
    needs: build # wait for images to be pushed

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Write the SSH private key to a temp file for use in subsequent steps
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Add server to known_hosts to avoid interactive prompt
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      # Copy the docker-compose.yml (and any other config files) to the server.
      # We only copy what the server needs to run — not the whole repo.
      - name: Copy deployment files to server
        run: |
          scp -i ~/.ssh/deploy_key \
            docker-compose.yml \
            prometheus.yml \
            nginx.conf \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/app/

      # SSH in and perform the deploy:
      # 1. Write a fresh .env with all secrets (never committed to git)
      # 2. Pull the new :latest images
      # 3. Restart only changed containers (compose up --no-build)
      # 4. Clean up old/dangling images to save disk space
      - name: Deploy via SSH
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'ENDSSH'
            set -e  # exit immediately on any error

            cd ~/app

            # ── Write .env file ──────────────────────────────────────────
            # This is the canonical way to pass secrets to docker compose
            # on the server without ever putting them in the repo or image
            cat > .env << EOF
          DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          NODE_ENV=production
          EOF

            # ── Pull new images ──────────────────────────────────────────
            echo "Pulling latest images..."
            docker compose pull frontend backend

            # ── Restart containers ───────────────────────────────────────
            # --remove-orphans cleans up containers for removed services
            echo "Restarting containers..."
            docker compose up -d --remove-orphans

            # ── Health check ─────────────────────────────────────────────
            echo "Waiting for backend to be healthy..."
            for i in {1..12}; do
              if curl -sf http://localhost/health > /dev/null; then
                echo "✅ Backend is healthy"
                break
              fi
              if [ $i -eq 12 ]; then
                echo "❌ Health check failed after 60s"
                docker compose logs --tail=50 backend
                exit 1
              fi
              echo "  attempt $i/12, retrying in 5s..."
              sleep 5
            done

            # ── Cleanup ──────────────────────────────────────────────────
            echo "Cleaning up old images..."
            docker image prune -f

            echo "🚀 Deploy complete!"
          ENDSSH

      # Clean up the private key from the runner
      - name: Cleanup SSH key
        if: always() # run even if deploy step failed
        run: rm -f ~/.ssh/deploy_key
